name: Rust CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      run_soroban_sanity:
        description: "Run the optional Soroban sandbox sanity stage"
        required: false
        default: false
        type: boolean

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUST_BACKTRACE: 1

defaults:
  run:
    shell: bash
    working-directory: stellar-insured-contracts

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-insured-contracts/target
          key: fmt-${{ runner.os }}-${{ hashFiles('stellar-insured-contracts/Cargo.lock', 'stellar-insured-contracts/rust-toolchain.toml') }}
          restore-keys: |
            fmt-${{ runner.os }}-
            ${{ runner.os }}-

      - name: Run rustfmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-insured-contracts/target
          key: clippy-${{ runner.os }}-${{ hashFiles('stellar-insured-contracts/Cargo.lock', 'stellar-insured-contracts/rust-toolchain.toml') }}
          restore-keys: |
            clippy-${{ runner.os }}-
            ${{ runner.os }}-

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test-workspace:
    name: Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-insured-contracts/target
          key: test-workspace-${{ runner.os }}-${{ hashFiles('stellar-insured-contracts/Cargo.lock', 'stellar-insured-contracts/rust-toolchain.toml') }}
          restore-keys: |
            test-workspace-${{ runner.os }}-
            ${{ runner.os }}-

      - name: Run workspace tests
        run: cargo test --workspace

  package-matrix:
    name: Package Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: propchain-contracts
          - package: propchain-traits
          - package: propchain-proxy
          - package: propchain-escrow
          - package: ipfs-metadata
          - package: security-audit
          - package: oracle
          - package: propchain-bridge
          - package: property-token
          - package: propchain-insurance
          - package: propchain-analytics
          - package: propchain-fees
          - package: compliance_registry
          - package: fractional
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo + package target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-insured-contracts/target
          key: package-${{ matrix.package }}-${{ runner.os }}-${{ hashFiles('stellar-insured-contracts/Cargo.lock', 'stellar-insured-contracts/rust-toolchain.toml') }}
          restore-keys: |
            package-${{ matrix.package }}-${{ runner.os }}-
            package-${{ runner.os }}-
            ${{ runner.os }}-

      - name: Run package tests
        run: cargo test -p ${{ matrix.package }} --all-targets

  soroban-sandbox-sanity:
    name: Soroban Sandbox Sanity
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_soroban_sanity == 'true' &&
      hashFiles('stellar-insured-contracts/scripts/orchestrate-soroban.sh') != '' &&
      hashFiles('stellar-insured-contracts/contracts/policy/**') != '' &&
      hashFiles('stellar-insured-contracts/contracts/slashing/**') != '' &&
      hashFiles('stellar-insured-contracts/contracts/governance/**') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Soroban orchestration dry-run sanity
        run: |
          chmod +x scripts/orchestrate-soroban.sh
          ./scripts/orchestrate-soroban.sh \
            --network local \
            --token-id TESTTOKENCONTRACTID \
            --dry-run
